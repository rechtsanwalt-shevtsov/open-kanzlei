UserTeam:
  type: object
  required: [id, name]
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      nullable: true
      description: Stable identifier for system teams (admin, regular)
    name:
      type: string

Team:
  type: object
  required: [id, name, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      nullable: true
      description: Stable identifier for system teams (admin, regular)
    name:
      type: string
      minLength: 1
      maxLength: 128
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateTeamRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 128

UpdateTeamRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 128

TenantUser:
  type: object
  required:
    - id
    - username
    - teams
    - is_active
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
      format: email
      nullable: true
    teams:
      type: array
      items:
        $ref: '#/UserTeam'
    is_active:
      type: boolean
    preferred_language:
      type: string
      enum: [de, en]
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateTenantUserRequest:
  type: object
  required: [username, password, team_ids]
  properties:
    username:
      type: string
      minLength: 1
      maxLength: 64
    email:
      type: string
      format: email
      nullable: true
    password:
      type: string
      minLength: 8
      format: password
    team_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    preferred_language:
      type: string
      enum: [de, en]

UpdateTenantUserRequest:
  type: object
  properties:
    email:
      type: string
      format: email
      nullable: true
    password:
      type: string
      minLength: 8
      format: password
    team_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    is_active:
      type: boolean
    preferred_language:
      type: string
      enum: [de, en]
