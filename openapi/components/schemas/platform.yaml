UserGroup:
  type: object
  required: [id, name]
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      nullable: true
      description: Stable identifier for system groups (admin, regular, plattformuser)
    name:
      type: string

Group:
  type: object
  required: [id, name, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    key:
      type: string
      nullable: true
      description: Stable identifier for system groups (admin, regular, plattformuser)
    name:
      type: string
      minLength: 1
      maxLength: 128
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateGroupRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 128

UpdateGroupRequest:
  type: object
  required: [name]
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 128

TenantUser:
  type: object
  deprecated: true
  description: Use PlatformUser instead.
  required:
    - id
    - username
    - groups
    - is_active
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
      format: email
      nullable: true
    groups:
      type: array
      items:
        $ref: '#/UserGroup'
    is_active:
      type: boolean
    preferred_language:
      type: string
      enum: [de, en]
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

PlatformUser:
  type: object
  required:
    - id
    - display_name
    - actor_model_id
    - groups
    - has_login
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
      description: Actor id
    display_name:
      type: string
    username:
      type: string
      nullable: true
    email:
      type: string
      format: email
      nullable: true
    actor_model_id:
      type: string
      format: uuid
    groups:
      type: array
      items:
        $ref: '#/UserGroup'
    has_login:
      type: boolean
    preferred_language:
      type: string
      enum: [de, en]
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreatePlatformUserRequest:
  type: object
  required: [username, password, group_ids]
  properties:
    username:
      type: string
      minLength: 1
      maxLength: 64
    password:
      type: string
      minLength: 8
      format: password
    email:
      type: string
      format: email
      nullable: true
    first_name:
      type: string
      nullable: true
    display_name:
      type: string
      nullable: true
    actor_model_id:
      type: string
      format: uuid
    group_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    preferred_language:
      type: string
      enum: [de, en]

UpdatePlatformUserRequest:
  type: object
  properties:
    username:
      type: string
      minLength: 1
      maxLength: 64
    password:
      type: string
      minLength: 8
      format: password
    email:
      type: string
      format: email
      nullable: true
    first_name:
      type: string
      nullable: true
    display_name:
      type: string
      nullable: true
    group_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    preferred_language:
      type: string
      enum: [de, en]
    revoke_login:
      type: boolean

CreateTenantUserRequest:
  type: object
  required: [username, password, group_ids]
  properties:
    username:
      type: string
      minLength: 1
      maxLength: 64
    email:
      type: string
      format: email
      nullable: true
    password:
      type: string
      minLength: 8
      format: password
    group_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    preferred_language:
      type: string
      enum: [de, en]

UpdateTenantUserRequest:
  type: object
  properties:
    email:
      type: string
      format: email
      nullable: true
    password:
      type: string
      minLength: 8
      format: password
    group_ids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
    is_active:
      type: boolean
    preferred_language:
      type: string
      enum: [de, en]
