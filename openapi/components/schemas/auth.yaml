RegisterTenantRequest:
  type: object
  required:
    - firm_name
    - admin_username
    - admin_email
    - admin_password
    - default_language
  properties:
    firm_name:
      type: string
      minLength: 1
      maxLength: 255
      description: Kanzleiname
    admin_username:
      type: string
      minLength: 1
      maxLength: 64
    admin_email:
      type: string
      format: email
    admin_password:
      type: string
      minLength: 8
      format: password
    default_language:
      type: string
      enum: [de, en]

LoginRequest:
  type: object
  required: [username, password]
  properties:
    username:
      type: string
    password:
      type: string
      format: password

AuthSessionResponse:
  type: object
  required: [user]
  properties:
    user:
      $ref: '#/CurrentUserResponse'

CurrentUserResponse:
  type: object
  required: [id, tenant_id, username, groups]
  properties:
    id:
      type: string
      format: uuid
    tenant_id:
      type: string
      format: uuid
    username:
      type: string
    email:
      type: string
      format: email
      nullable: true
    preferred_language:
      type: string
      enum: [de, en]
      nullable: true
    groups:
      type: array
      items:
        $ref: '../schemas/platform.yaml#/UserGroup'
