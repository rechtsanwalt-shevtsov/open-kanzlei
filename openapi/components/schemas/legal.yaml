Translations:
  type: object
  additionalProperties:
    type: string
  example:
    de: Fallakte
    en: Case file

ModelKey:
  type: string
  pattern: '^[a-z][a-z0-9_]{0,62}$'

StatusKey:
  type: string
  minLength: 1
  maxLength: 64
  description: Language-neutral status key (e.g. active, open, closed)

DataType:
  type: string
  enum: [text, number, money, date, boolean, single_select, multi_select]

DefinitionScope:
  type: string
  enum: [model, instance]

EncryptionMode:
  type: string
  enum: [server_readable, zero_knowledge]

CaseModelStatus:
  type: string
  enum: [draft, active, archived]

CaseModel:
  type: object
  required: [id, key, status, translations, description, display_name, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    key:
      $ref: '#/ModelKey'
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string
      description: Stable model description (plain text)
    description_translations:
      $ref: '#/Translations'
      deprecated: true
    display_name:
      type: string
      description: Resolved label for the effective request locale (Accept-Language), with fallback de → en → key
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateCaseModelRequest:
  type: object
  description: >
    Provide either name (server generates key and translations[locale]) or legacy key + translations.
  properties:
    name:
      type: string
      minLength: 1
      description: Display name in the given locale; server generates a unique key
    locale:
      type: string
      enum: [de, en]
      description: Locale of name; defaults to Accept-Language when omitted
    key:
      $ref: '#/ModelKey'
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string
    description_translations:
      $ref: '#/Translations'
      deprecated: true

UpdateCaseModelRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      description: Updates translations[locale] without removing other locales
    locale:
      type: string
      enum: [de, en]
      description: Locale of name; defaults to Accept-Language when omitted
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string
    description_translations:
      $ref: '#/Translations'
      deprecated: true

Assignee:
  type: object
  required: [actor_id, label]
  properties:
    actor_id:
      type: string
      format: uuid
    label:
      type: string

Case:
  type: object
  required: [id, case_model_id, status, encryption_status, assignees, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    case_model_id:
      type: string
      format: uuid
    status:
      $ref: '#/StatusKey'
    encryption_status:
      type: string
    encryption_version:
      type: integer
      nullable: true
    attributes:
      type: object
      additionalProperties: true
      description: Attribute values keyed by definition key (includes status)
    assignees:
      type: array
      items:
        $ref: '#/Assignee'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateCaseRequest:
  type: object
  required: [case_model_id]
  properties:
    case_model_id:
      type: string
      format: uuid
    status:
      $ref: '#/StatusKey'
    attributes:
      type: object
      additionalProperties: true
    assignee_actor_ids:
      type: array
      items:
        type: string
        format: uuid

UpdateCaseRequest:
  type: object
  properties:
    status:
      $ref: '#/StatusKey'
    attributes:
      type: object
      additionalProperties: true
    assignee_actor_ids:
      type: array
      items:
        type: string
        format: uuid

AttributeDefinition:
  type: object
  required:
    - id
    - owner_type
    - owner_id
    - definition_scope
    - key
    - data_type
    - encryption_mode
    - translations
    - is_required
    - select_options
    - select_option_translations
    - display_name
  properties:
    id:
      type: string
      format: uuid
    owner_type:
      type: string
      enum: [case_model, task_model, actor_model]
    owner_id:
      type: string
      format: uuid
    definition_scope:
      $ref: '#/DefinitionScope'
    key:
      $ref: '#/ModelKey'
    data_type:
      $ref: '#/DataType'
    encryption_mode:
      $ref: '#/EncryptionMode'
    translations:
      $ref: '#/Translations'
    is_required:
      type: boolean
    select_options:
      type: array
      items:
        type: string
    select_option_translations:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: string
      description: Map of option key to locale labels (e.g. {"waiting_client":{"de":"…","en":"…"}})
    select_option_labels:
      type: object
      additionalProperties:
        type: string
      description: Resolved option labels for the effective request locale (read-only in responses)
    locked_select_options:
      type: array
      items:
        type: string
      description: Shared-registry option keys that may be labeled but not removed or renamed (read-only in responses)
    default_value:
      description: Default for new instances (instance scope) or model value (model scope)
    display_name:
      type: string
      description: Resolved label for the effective request locale (Accept-Language), with fallback de → en → key
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateAttributeDefinitionRequest:
  type: object
  description: >
    Provide either name (server generates key and translations[locale]) or legacy key + translations.
  required: [data_type]
  properties:
    name:
      type: string
      minLength: 1
    locale:
      type: string
      enum: [de, en]
    definition_scope:
      $ref: '#/DefinitionScope'
    key:
      $ref: '#/ModelKey'
    data_type:
      $ref: '#/DataType'
    encryption_mode:
      $ref: '#/EncryptionMode'
    translations:
      $ref: '#/Translations'
    is_required:
      type: boolean
    select_options:
      type: array
      items:
        type: string
    select_option_translations:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: string
    default_value: {}

UpdateAttributeDefinitionRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
    locale:
      type: string
      enum: [de, en]
    data_type:
      $ref: '#/DataType'
    encryption_mode:
      $ref: '#/EncryptionMode'
    translations:
      $ref: '#/Translations'
    is_required:
      type: boolean
    select_options:
      type: array
      items:
        type: string
    select_option_translations:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: string
    default_value: {}

AttributeValuesRequest:
  type: object
  required: [values]
  properties:
    values:
      type: object
      additionalProperties: true
      description: Map of attribute key to value

TaskModel:
  type: object
  required: [id, key, status, translations, description, display_name, created_at, updated_at]
  properties:
    id:
      type: string
      format: uuid
    key:
      $ref: '#/ModelKey'
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string
    description_translations:
      $ref: '#/Translations'
      deprecated: true
    display_name:
      type: string
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateTaskModelRequest:
  type: object
  description: >
    Provide either name (server generates key and translations[locale]) or legacy key + translations.
  properties:
    name:
      type: string
      minLength: 1
    locale:
      type: string
      enum: [de, en]
    key:
      $ref: '#/ModelKey'
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string

UpdateTaskModelRequest:
  type: object
  properties:
    name:
      type: string
      minLength: 1
    locale:
      type: string
      enum: [de, en]
    status:
      $ref: '#/CaseModelStatus'
    translations:
      $ref: '#/Translations'
    description:
      type: string

Task:
  type: object
  required:
    - id
    - case_id
    - task_model_id
    - status
    - predecessor_task_ids
    - dependent_task_ids
    - encryption_status
    - assignees
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    case_id:
      type: string
      format: uuid
    task_model_id:
      type: string
      format: uuid
    status:
      $ref: '#/StatusKey'
    predecessor_task_ids:
      type: array
      items:
        type: string
        format: uuid
    dependent_task_ids:
      type: array
      items:
        type: string
        format: uuid
    encryption_status:
      type: string
    encryption_version:
      type: integer
      nullable: true
    attributes:
      type: object
      additionalProperties: true
      description: Attribute values keyed by definition key (includes status, title, task references)
    assignees:
      type: array
      items:
        $ref: '#/Assignee'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    completed_at:
      type: string
      format: date-time
      nullable: true
      description: Set when status becomes completed; cleared when status leaves completed

CreateTaskRequest:
  type: object
  required: [case_id, task_model_id]
  properties:
    case_id:
      type: string
      format: uuid
    task_model_id:
      type: string
      format: uuid
    status:
      $ref: '#/StatusKey'
    predecessor_task_ids:
      type: array
      items:
        type: string
        format: uuid
    dependent_task_ids:
      type: array
      items:
        type: string
        format: uuid
    attributes:
      type: object
      additionalProperties: true
    assignee_actor_ids:
      type: array
      items:
        type: string
        format: uuid

CreateCaseTaskRequest:
  type: object
  required: [task_model_id]
  properties:
