  type: object
  required:
    - id
    - case_id
    - task_model_id
    - status
    - predecessor_task_ids
    - dependent_task_ids
    - encryption_status
    - assignees
    - created_at
    - updated_at
  properties:
    id:
      type: string
      format: uuid
    case_id:
      type: string
      format: uuid
    task_model_id:
      type: string
      format: uuid
    status:
      $ref: '#/StatusKey'
    predecessor_task_ids:
      type: array
      items:
        type: string
        format: uuid
    dependent_task_ids:
      type: array
      items:
        type: string
        format: uuid
    encryption_status:
      type: string
    encryption_version:
      type: integer
      nullable: true
    attributes:
      type: object
      additionalProperties: true
      description: Attribute values keyed by definition key (includes status, title, task references)
    assignees:
      type: array
      items:
        $ref: '#/Assignee'
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
    completed_at:
      type: string
      format: date-time
      nullable: true
      description: Set when status becomes completed; cleared when status leaves completed

