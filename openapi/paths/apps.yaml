apps-list:
  get:
    tags: [Apps]
    operationId: listInstalledApps
    summary: List installed apps for current tenant and user
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '../components/schemas/apps.yaml#/AppInstallation'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'

tenant-apps-catalog:
  get:
    tags: [Apps]
    operationId: listTenantAppCatalog
    summary: List all known apps with installation status for current tenant (admin)
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '../components/schemas/apps.yaml#/TenantAppCatalogEntry'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

tenant-app-group-status:
  patch:
    tags: [Apps]
    operationId: patchGroupAppStatus
    summary: Activate or deactivate an app for a platform group (admin)
    security: [{ sessionCookie: [] }]
    parameters:
      - name: appKey
        in: path
        required: true
        schema:
          $ref: '../components/schemas/apps.yaml#/AppKey'
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/apps.yaml#/PatchGroupAppStatusRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/apps.yaml#/TenantAppCatalogEntry'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

tenant-app-assignments:
  get:
    tags: [Apps]
    operationId: listTenantAppAssignments
    summary: List app group assignments for all platform groups and user overrides (admin)
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/apps.yaml#/TenantAppAssignments'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

tenant-group-app-assignments:
  put:
    tags: [Apps]
    operationId: setGroupAppAssignments
    summary: Set app group assignments for a platform group (admin)
    security: [{ sessionCookie: [] }]
    parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/apps.yaml#/AppGroupAssignments'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/apps.yaml#/GroupAppAssignmentRow'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

tenant-actor-app-assignments:
  put:
    tags: [Apps]
    operationId: setActorAppAssignments
    summary: Set per-actor app group assignment override (admin)
    security: [{ sessionCookie: [] }]
    parameters:
      - name: actorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/apps.yaml#/AppGroupAssignments'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/apps.yaml#/ActorAppAssignmentRow'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  delete:
    tags: [Apps]
    operationId: clearActorAppAssignments
    summary: Remove per-actor app assignment override (admin)
    security: [{ sessionCookie: [] }]
    parameters:
      - name: actorId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [ok]
              properties:
                ok:
                  type: boolean
      '401':
