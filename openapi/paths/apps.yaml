apps-list:
  get:
    tags: [Apps]
    operationId: listInstalledApps
    summary: List installed apps for current tenant and user
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '../components/schemas/apps.yaml#/AppInstallation'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'

tenant-apps-catalog:
  get:
    tags: [Apps]
    operationId: listTenantAppCatalog
    summary: List all known apps with installation status for current tenant (admin)
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '../components/schemas/apps.yaml#/TenantAppCatalogEntry'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'

tenant-app-team-status:
  patch:
    tags: [Apps]
    operationId: patchTeamAppStatus
    summary: Activate or deactivate an app for a team (admin)
    security: [{ sessionCookie: [] }]
    parameters:
      - name: appKey
        in: path
        required: true
        schema:
          $ref: '../components/schemas/apps.yaml#/AppKey'
      - name: teamId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/apps.yaml#/PatchTeamAppStatusRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/apps.yaml#/TenantAppCatalogEntry'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

