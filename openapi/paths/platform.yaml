groups-list:
  get:
    tags: [Platform]
    operationId: listGroups
    security: [{ sessionCookie: [] }]
    responses:
      '200':
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: '../components/schemas/platform.yaml#/Group'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
  post:
    tags: [Platform]
    operationId: createGroup
    security: [{ sessionCookie: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/platform.yaml#/CreateGroupRequest'
    responses:
      '201':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/platform.yaml#/Group'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '409':
        $ref: '../components/responses/common.yaml#/Conflict'

