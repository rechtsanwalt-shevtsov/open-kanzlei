groups-item:
  patch:
    tags: [Platform]
    operationId: updateGroup
    security: [{ sessionCookie: [] }]
    parameters:
      - $ref: '../components/parameters/legal.yaml#/IdPath'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/platform.yaml#/UpdateGroupRequest'
    responses:
      '200':
        content:
          application/json:
            schema:
              $ref: '../components/schemas/platform.yaml#/Group'
      '400':
        $ref: '../components/responses/common.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
      '409':
        $ref: '../components/responses/common.yaml#/Conflict'
  delete:
    tags: [Platform]
    operationId: deleteGroup
    security: [{ sessionCookie: [] }]
    parameters:
      - $ref: '../components/parameters/legal.yaml#/IdPath'
    responses:
      '204':
        description: Deleted
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/common.yaml#/Forbidden'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

