openapi: 3.1.0
info:
  title: OpenKanzlei API
  version: 0.5.0
  description: |
    Work-Context-Plattform für juristische Wissensarbeit.
    API-first — Vertrag vor Implementierung.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Tenant registration and session management
  - name: Tenant
    description: Tenant profile and settings
  - name: WorkContext
    description: |
      Reserved for neutral work-context queries (no prioritization or workflow logic).
      Endpoints will be added in later phases.
  - name: LegalWork
    description: Case models, task models, and instances
  - name: Platform
    description: Tenant users and teams (administration)
  - name: Apps
    description: First-party app registry, installations and settings

paths:
  /v1/auth/register-tenant:
    $ref: './paths/auth.yaml#/register-tenant'
  /v1/auth/login:
    $ref: './paths/auth.yaml#/login'
  /v1/auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /v1/auth/me:
    $ref: './paths/auth.yaml#/me'
  /v1/tenant/profile:
    $ref: './paths/tenant.yaml#/profile'
  /v1/tenant/ui-preferences:
    $ref: './paths/ui.yaml#/tenant-ui-preferences'
  /v1/me/ui-preferences:
    $ref: './paths/ui.yaml#/me-ui-preferences'

  /v1/apps:
    $ref: './paths/apps.yaml#/apps-list'
  /v1/tenant/apps:
    $ref: './paths/apps.yaml#/tenant-apps-catalog'
  /v1/tenant/apps/{appKey}/teams/{teamId}:
    $ref: './paths/apps.yaml#/tenant-app-team-status'
  /v1/tenant/app-assignments:
    $ref: './paths/apps.yaml#/tenant-app-assignments'
  /v1/tenant/teams/{teamId}/app-assignments:
    $ref: './paths/apps.yaml#/tenant-team-app-assignments'
  /v1/tenant/actors/{actorId}/app-assignments:
    $ref: './paths/apps.yaml#/tenant-actor-app-assignments'
  /v1/me/active-apps-by-group:
    $ref: './paths/apps.yaml#/me-active-apps-by-group'
  /v1/actors/{actorId}/active-apps-by-group:
    $ref: './paths/apps.yaml#/actor-active-apps-by-group'
  /v1/apps/{appKey}/manifest:
    $ref: './paths/apps.yaml#/apps-manifest'
  /v1/apps/{appKey}/settings/effective:
    $ref: './paths/apps.yaml#/apps-effective-settings'
  /v1/tenant/apps/{appKey}/settings:
    $ref: './paths/apps.yaml#/tenant-app-settings'
  /v1/me/apps/{appKey}/settings:
    $ref: './paths/apps.yaml#/me-app-settings'

  /v1/apps/tasks-kanban/board:
    $ref: './paths/tasks-kanban.yaml#/tasks-kanban-board'
  /v1/apps/tasks-kanban/moves:
    $ref: './paths/tasks-kanban.yaml#/tasks-kanban-moves'
  /v1/apps/tasks-kanban/wip-limits:
    $ref: './paths/tasks-kanban.yaml#/tasks-kanban-wip-limits'

  /v1/teams:
    $ref: './paths/platform.yaml#/teams-list'
  /v1/teams/assignable:
    $ref: './paths/platform.yaml#/teams-assignable-list'
  /v1/teams/{id}:
    $ref: './paths/platform.yaml#/teams-item'
  /v1/platform-users:
    $ref: './paths/platform.yaml#/users-list'
  /v1/platform-users/{id}:
    $ref: './paths/platform.yaml#/users-item'

  /v1/case-models:
    $ref: './paths/legal.yaml#/case-models-list'
  /v1/case-models/{id}:
    $ref: './paths/legal.yaml#/case-models-item'
  /v1/case-models/{id}/attributes:
    $ref: './paths/legal.yaml#/case-models-attributes'

  /v1/case-models/{id}/task-model-exclusions:
    $ref: './paths/legal.yaml#/case-model-task-model-exclusions'

  /v1/task-models:
    $ref: './paths/legal.yaml#/task-models-list'
  /v1/task-models/{id}:
    $ref: './paths/legal.yaml#/task-models-item'
  /v1/task-models/{id}/attributes:
    $ref: './paths/legal.yaml#/task-models-attributes'

  /v1/attribute-definitions/{id}:
    $ref: './paths/legal.yaml#/attribute-definitions-item'

  /v1/cases:
    $ref: './paths/legal.yaml#/cases-list'
  /v1/cases/{id}:
    $ref: './paths/legal.yaml#/cases-item'
  /v1/cases/{caseId}/tasks:
    $ref: './paths/legal.yaml#/case-tasks-list'

  /v1/tasks:
    $ref: './paths/legal.yaml#/tasks-list'
  /v1/tasks/{id}:
    $ref: './paths/legal.yaml#/tasks-item'

  /v1/actor-models:
    $ref: './paths/legal.yaml#/actor-models-list'
  /v1/actor-models/{id}:
    $ref: './paths/legal.yaml#/actor-models-item'
  /v1/actor-models/{id}/attributes:
    $ref: './paths/legal.yaml#/actor-models-attributes'

  /v1/actors:
    $ref: './paths/legal.yaml#/actors-list'
  /v1/actors/{id}:
    $ref: './paths/legal.yaml#/actors-item'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: openkanzlei_session
  schemas:
    $ref: './components/schemas/index.yaml'
  parameters:
    $ref: './components/parameters/index.yaml'
  responses:
    $ref: './components/responses/index.yaml'
