services:
  postgres:
    image: postgres:16-alpine
    container_name: openkanzlei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: openkanzlei
      POSTGRES_PASSWORD: openkanzlei
      POSTGRES_DB: openkanzlei
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openkanzlei -d openkanzlei"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
